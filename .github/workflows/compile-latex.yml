name: Compile LaTeX
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install TeX Live
      run: sudo apt-get install -y -qq texlive-xetex texlive-latex-extra texlive-fonts-extra texlive-lang-chinese latexmk
    - name: Compile all
      run: |
        cd $GITHUB_WORKSPACE
        for f in main.tex math/math-guide.tex math/math-quickref.tex math/math-mock-01.tex math/math-mock-02.tex math/math-mock-03.tex; do
          echo "=== Building $f ==="
          latexmk -xelatex -interaction=nonstopmode "$f" || echo "FAILED: $f"
          echo ""
        done
    - name: Upload
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: PDFs
        path: |
          *.pdf
          math/*.pdf
        if-no-files-found: warn
