name: Compile LaTeX

on:
  push:
    branches: [ main ]
    paths:
      - '**.tex'
      - '.github/workflows/compile-latex.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install TeX Live
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq texlive-latex-base texlive-latex-recommended \
          texlive-latex-extra texlive-xetex texlive-fonts-recommended \
          texlive-fonts-extra texlive-lang-chinese latexmk xz-utils
    - name: Compile all PDFs
      run: |
        cd $GITHUB_WORKSPACE
        for f in main.tex math/math-quickref.tex math/math-guide.tex \
                 math/math-mock-01.tex math/math-mock-02.tex math/math-mock-03.tex; do
          echo "=== Compiling $f ==="
          latexmk -xelatex -interaction=nonstopmode "$f" 2>&1 | tail -5
          echo ""
        done
    - name: Upload PDFs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-PDFs
        path: |
          *.pdf
          math/*.pdf
        if-no-files-found: warn
