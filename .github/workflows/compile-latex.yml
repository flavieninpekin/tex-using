name: Compile LaTeX
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install TeX Live
      run: sudo apt-get install -y -qq texlive-xetex texlive-latex-extra texlive-fonts-extra texlive-lang-chinese latexmk
    - name: Compile
      run: |
        for f in main.tex math/math-guide.tex math/math-mock-01.tex math/math-mock-02.tex math/math-mock-03.tex math/math-quickref.tex; do
          cd $GITHUB_WORKSPACE && echo "=== $f ===" && latexmk -xelatex -interaction=nonstopmode "$f" && ls -la *.pdf math/*.pdf 2>/dev/null || true
        done
    - name: Upload
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: PDFs
        path: "*.pdf"
        if-no-files-found: warn
