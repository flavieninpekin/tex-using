name: Compile LaTeX

on:
  push:
    branches: [ main ]
    paths:
      - '**.tex'
      - '.github/workflows/compile-latex.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.tex'
      - '.github/workflows/compile-latex.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install TeX Live
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-latex-base texlive-latex-recommended \
          texlive-latex-extra texlive-xetex texlive-fonts-recommended \
          texlive-fonts-extra texlive-lang-chinese latexmk xz-utils

    - name: Compile main.pdf
      run: |
        cd $GITHUB_WORKSPACE
        latexmk -xelatex -interaction=nonstopmode main.tex
        [ -f main.pdf ] && echo "main.pdf generated OK" || { echo "main.pdf not found!"; exit 1; }

    - name: Compile per-subject
      run: |
        cd $GITHUB_WORKSPACE
        for dir in 数学; do
          if [ -f "$dir/$dir.tex" ] && head -1 "$dir/$dir.tex" | grep -q 'documentclass'; then
            cd "$dir"
            latexmk -xelatex -interaction=nonstopmode "$dir.tex" || true
            [ -f "$dir.pdf" ] && echo "$dir.pdf generated OK" || echo "$dir.pdf NOT found"
            cd ..
          fi
        done

    - name: Upload PDF artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-PDFs
        path: |
          *.pdf
          **/*.pdf
        if-no-files-found: warn
