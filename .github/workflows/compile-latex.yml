name: Compile LaTeX

on:
  push:
    branches: [ main ]
    paths:
      - '**.tex'
  pull_request:
    branches: [ main ]
    paths:
      - '**.tex'
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install TeX Live
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-latex-base texlive-latex-recommended \
          texlive-latex-extra texlive-xetex texlive-fonts-recommended \
          texlive-fonts-extra texlive-lang-chinese latexmk xz-utils

    - name: Compile LaTeX - main.pdf
      run: |
        cd $GITHUB_WORKSPACE
        latexmk -xelatex -interaction=nonstopmode -halt-on-error main.tex

    - name: Compile LaTeX - per subject
      run: |
        cd $GITHUB_WORKSPACE
        for dir in 数学 语文 英语 物理 化学 生物; do
          if [ -f "$dir/$dir.tex" ]; then
            cd "$dir"
            latexmk -xelatex -interaction=nonstopmode -halt-on-error "$dir.tex" || true
            cd ..
          fi
        done

    - name: Upload PDF artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-PDFs
        path: |
          *.pdf
          **/*.pdf
        if-no-files-found: warn
